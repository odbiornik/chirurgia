    async function unlock() {
        const passwordField = document.getElementById('pass_input');
        const password = passwordField.value;
        const error = document.getElementById('err-msg');

        try {
            const encoder = new TextEncoder();
            const decoder = new TextDecoder();
            
            // Generowanie klucza SHA-256
            const pwHash = await crypto.subtle.digest('SHA-256', encoder.encode(password));
            const key = await crypto.subtle.importKey('raw', pwHash, { name: 'AES-GCM' }, false, ['decrypt']);

            // Parsowanie danych
            const combined = Uint8Array.from(atob(encryptedPayload), c => c.charCodeAt(0));
            const iv = combined.slice(0, 12);
            const data = combined.slice(12);

            // Próba deszyfrowania
            const decrypted = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: iv }, key, data);
            
            // Sukces: wstrzyknięcie kodu
            document.open();
            document.write(decoder.decode(decrypted));
            document.close();

        } catch (e) {
            // Błąd: identyczne zachowanie jak w oryginale
            error.style.display = 'block';
            passwordField.value = "";
        }
    }

    // Obsługa Entera
    document.getElementById('pass_input').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') unlock();
    });
</script>
